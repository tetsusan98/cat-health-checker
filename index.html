<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>猫の健康チェッカー｜猫リテラシー研究所</title>
    <link href="https://fonts.googleapis.com/css2?family=Zen+Antique+Soft&family=Noto+Serif+JP:wght@400;500&family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --gold: #8c6a3f;
            --gold-light: #b8956a;
            --gold-pale: #e8ddd0;
            --cream: #f0ebe3;
            --bg: #ffffff;
            --text: #1a1410;
            --border: #ddd5c8;
            --gray-text: #6b6055;
            --good: #3f6f4a;
            --fair: #b8956a;
            --concern: #b4503f;
        }
        body {
            font-family: 'Noto Serif JP', serif;
            background: var(--cream);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px 16px;
        }
        .container {
            max-width: 480px;
            width: 100%;
            background: var(--bg);
            border-radius: 16px;
            border: 1px solid var(--border);
            padding: 36px 28px 28px;
            box-shadow: 0 12px 40px rgba(139, 106, 63, 0.08);
        }
        .header-label {
            font-family: 'Cormorant Garamond', serif;
            font-size: 12px;
            letter-spacing: 0.35em;
            text-transform: uppercase;
            color: var(--gold);
            text-align: center;
            margin-bottom: 6px;
        }
        .header-title {
            font-family: 'Zen Antique Soft', serif;
            font-size: 22px;
            color: var(--text);
            text-align: center;
            letter-spacing: 0.06em;
            font-weight: 400;
            margin-bottom: 4px;
        }
        .header-sub {
            font-size: 13px;
            color: var(--gray-text);
            text-align: center;
            margin-bottom: 24px;
        }
        .upload-area {
            border: 2px dashed var(--border);
            border-radius: 12px;
            padding: 32px 16px;
            text-align: center;
            background: #faf8f4;
            transition: border-color 0.3s, background 0.3s;
            cursor: pointer;
        }
        .upload-area:hover,
        .upload-area.dragover {
            background: var(--cream);
            border-color: var(--gold);
        }
        .upload-icon {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: 1.5px solid var(--gold);
            margin: 0 auto 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .upload-icon svg {
            width: 22px;
            height: 22px;
            stroke: var(--gold);
            fill: none;
            stroke-width: 1.5;
            stroke-linecap: round;
            stroke-linejoin: round;
        }
        .upload-text {
            font-size: 14px;
            color: var(--text);
            margin-bottom: 4px;
        }
        .upload-or {
            font-size: 12px;
            color: var(--gold-light);
            margin-bottom: 10px;
        }
        .btn-outline {
            display: inline-block;
            padding: 9px 24px;
            border: 1px solid var(--gold);
            border-radius: 8px;
            font-family: 'Noto Serif JP', serif;
            font-size: 13px;
            color: var(--gold);
            letter-spacing: 0.08em;
            cursor: pointer;
            background: transparent;
            transition: background 0.25s, color 0.25s;
        }
        .btn-outline:hover {
            background: var(--gold);
            color: #fff;
        }
        .btn-primary {
            display: block;
            width: 100%;
            padding: 12px;
            background: var(--gold);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-family: 'Noto Serif JP', serif;
            font-size: 14px;
            letter-spacing: 0.1em;
            cursor: pointer;
            transition: background 0.25s, transform 0.2s;
        }
        .btn-primary:hover { background: #5f3f23; transform: translateY(-2px); }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .btn-ghost {
            display: block;
            width: 100%;
            padding: 10px;
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-family: 'Noto Serif JP', serif;
            font-size: 13px;
            color: var(--gray-text);
            cursor: pointer;
            transition: border-color 0.25s, color 0.25s;
        }
        .btn-ghost:hover { border-color: var(--gold); color: var(--gold); }
        #fileInput { display: none; }
        .preview-section { display: none; margin-top: 20px; text-align: center; }
        .preview-wrap {
            position: relative;
            display: inline-block;
            margin-bottom: 12px;
        }
        #preview {
            max-width: 100%;
            max-height: 260px;
            border-radius: 10px;
            border: 1px solid var(--border);
            display: block;
        }
        .preview-close {
            position: absolute;
            top: 8px;
            right: 8px;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.9);
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 16px;
            color: var(--gray-text);
            line-height: 1;
        }
        .preview-close:hover { background: #fff; color: var(--text); }
        .preview-name {
            font-size: 12px;
            color: var(--gray-text);
            margin-bottom: 14px;
        }
        .loading { display: none; text-align: center; padding: 24px 0; }
        .spinner {
            width: 32px;
            height: 32px;
            border: 3px solid var(--gold-pale);
            border-top-color: var(--gold);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 10px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-text {
            font-family: 'Cormorant Garamond', serif;
            font-size: 13px;
            letter-spacing: 0.2em;
            color: var(--gold);
        }
        .results { display: none; margin-top: 20px; }
        .results-label {
            font-family: 'Cormorant Garamond', serif;
            font-size: 12px;
            letter-spacing: 0.35em;
            text-transform: uppercase;
            color: var(--gold);
            text-align: center;
            margin-bottom: 4px;
        }
        .results-title {
            font-family: 'Zen Antique Soft', serif;
            font-size: 18px;
            color: var(--text);
            text-align: center;
            letter-spacing: 0.06em;
            font-weight: 400;
            margin-bottom: 16px;
        }
        .result-summary {
            display: flex;
            gap: 12px;
            align-items: center;
            margin-bottom: 16px;
            padding: 12px;
            background: #faf8f4;
            border-radius: 10px;
            border: 1px solid var(--border);
        }
        .result-thumb {
            width: 56px;
            height: 56px;
            border-radius: 8px;
            object-fit: cover;
            border: 1px solid var(--border);
            flex-shrink: 0;
        }
        .result-overall-label {
            font-size: 11px;
            color: var(--gray-text);
            margin-bottom: 2px;
        }
        .result-overall-status {
            font-family: 'Zen Antique Soft', serif;
            font-size: 20px;
            letter-spacing: 0.04em;
        }
        .result-overall-desc {
            font-size: 11px;
            color: var(--gray-text);
            margin-top: 2px;
        }
        .status-good { color: var(--good); }
        .status-fair { color: var(--fair); }
        .status-concern { color: var(--concern); }
        .border-good { border-left-color: var(--good); }
        .border-fair { border-left-color: var(--fair); }
        .border-concern { border-left-color: var(--concern); }
        .dot-good { background: var(--good); }
        .dot-fair { background: var(--fair); }
        .dot-concern { background: var(--concern); }
        .result-items { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
        .result-item {
            border-left: 3px solid var(--good);
            padding: 10px 12px;
            background: #faf8f4;
            border-radius: 0 8px 8px 0;
        }
        .result-item-label {
            font-size: 11px;
            color: var(--gold);
            letter-spacing: 0.05em;
            margin-bottom: 3px;
        }
        .result-item-row {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .result-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
        }
        .result-item-text {
            font-size: 13px;
            color: var(--text);
            line-height: 1.6;
        }
        .result-advice {
            border-left: 3px solid var(--gold-light);
            padding: 10px 12px;
            background: #faf8f4;
            border-radius: 0 8px 8px 0;
        }
        .result-advice-label {
            font-size: 11px;
            color: var(--gold);
            letter-spacing: 0.05em;
            margin-bottom: 3px;
        }
        .result-advice-text {
            font-size: 13px;
            color: var(--text);
            line-height: 1.7;
        }
        .result-buttons {
            display: flex;
            gap: 10px;
            margin-top: 16px;
        }
        .result-buttons .btn-ghost { flex: 1; }
        .result-buttons .btn-primary { flex: 2; }
        .note {
            margin-top: 16px;
            background: #faf8f4;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 10px 12px;
        }
        .note p {
            font-size: 11px;
            color: var(--gray-text);
            line-height: 1.7;
        }
        .note-icon {
            color: var(--gold-light);
            margin-right: 4px;
        }
        .error-msg {
            text-align: center;
            color: var(--concern);
            font-size: 13px;
            margin-top: 12px;
            display: none;
        }
        @media (max-width: 520px) {
            body { padding: 12px 8px; }
            .container { padding: 28px 20px 22px; }
            .header-title { font-size: 20px; }
            .upload-area { padding: 24px 12px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header-label">Feline Health Scanner</div>
        <h1 class="header-title">猫の健康チェッカー</h1>
        <p class="header-sub">画像から健康状態をスキャンします</p>

        <div class="upload-area" id="uploadArea">
            <div class="upload-icon">
                <svg viewBox="0 0 24 24"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
            </div>
            <p class="upload-text">猫の写真をここにドロップ</p>
            <p class="upload-or">または</p>
            <button class="btn-outline" onclick="document.getElementById('fileInput').click()">ファイルを選択</button>
            <input type="file" id="fileInput" accept="image/*">
        </div>

        <div class="preview-section" id="previewSection">
            <div class="preview-wrap">
                <img id="preview" alt="猫の画像プレビュー">
                <button class="preview-close" id="previewClose" aria-label="画像を削除">×</button>
            </div>
            <p class="preview-name" id="previewName"></p>
            <button class="btn-primary" id="analyzeBtn">スキャン開始</button>
        </div>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p class="loading-text">Scanning…</p>
        </div>

        <div class="results" id="results"></div>

        <p class="error-msg" id="errorMsg"></p>

        <div class="note">
            <p><span class="note-icon">&#9888;</span>AIによる参考情報です。正確な健康診断には獣医師の診察を受けてください。</p>
        </div>
    </div>

    <script>
        var uploadArea = document.getElementById('uploadArea');
        var fileInput = document.getElementById('fileInput');
        var preview = document.getElementById('preview');
        var previewSection = document.getElementById('previewSection');
        var previewName = document.getElementById('previewName');
        var previewClose = document.getElementById('previewClose');
        var analyzeBtn = document.getElementById('analyzeBtn');
        var loading = document.getElementById('loading');
        var results = document.getElementById('results');
        var errorMsg = document.getElementById('errorMsg');

        var selectedFile = null;

        uploadArea.addEventListener('dragover', function (e) {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });
        uploadArea.addEventListener('dragleave', function () {
            uploadArea.classList.remove('dragover');
        });
        uploadArea.addEventListener('drop', function (e) {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            if (e.dataTransfer.files.length > 0) handleFile(e.dataTransfer.files[0]);
        });
        fileInput.addEventListener('change', function (e) {
            if (e.target.files.length > 0) handleFile(e.target.files[0]);
        });
        previewClose.addEventListener('click', clearAll);

        function handleFile(file) {
            if (!file.type.startsWith('image/')) { showError('画像ファイルを選択してください'); return; }
            selectedFile = file;
            var reader = new FileReader();
            reader.onload = function (e) {
                preview.src = e.target.result;
                previewName.textContent = file.name;
                uploadArea.style.display = 'none';
                previewSection.style.display = 'block';
                results.style.display = 'none';
                hideError();
            };
            reader.readAsDataURL(file);
        }

        analyzeBtn.addEventListener('click', function () {
            if (!selectedFile) return;
            loading.style.display = 'block';
            results.style.display = 'none';
            analyzeBtn.disabled = true;
            hideError();

            fileToBase64(selectedFile).then(function (base64) {
                return analyzeCatHealth(base64);
            }).then(function (analysis) {
                displayResults(analysis);
            }).catch(function (err) {
                showError('分析中にエラーが発生しました: ' + err.message);
            }).finally(function () {
                loading.style.display = 'none';
                analyzeBtn.disabled = false;
            });
        });

        function fileToBase64(file) {
            return new Promise(function (resolve, reject) {
                var reader = new FileReader();
                reader.onload = function () { resolve(reader.result.split(',')[1]); };
                reader.onerror = reject;
                reader.readAsDataURL(file);
            });
        }

        function analyzeCatHealth(base64Image) {
            return fetch('/api/analyze', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ image: base64Image })
            }).then(function (res) {
                if (!res.ok) throw new Error('API呼び出しに失敗しました');
                return res.json();
            }).then(function (data) {
                var textContent = data.content.find(function (c) { return c.type === 'text'; });
                if (!textContent) throw new Error('応答が取得できませんでした');
                var jsonText = textContent.text.trim();
                jsonText = jsonText.replace(/^```json\s*/i, '').replace(/^```\s*/i, '').replace(/\s*```$/i, '').trim();
                return JSON.parse(jsonText);
            });
        }

        function statusClass(s) {
            if (s === '良好') return 'good';
            if (s === '普通') return 'fair';
            return 'concern';
        }

        function displayResults(a) {
            var oc = statusClass(a.overall.status);
            var cc = statusClass(a.coat.status);
            var bc = statusClass(a.body.status);

            results.innerHTML =
                '<div class="results-label">Scan Report</div>' +
                '<div class="results-title">スキャン結果</div>' +

                '<div class="result-summary">' +
                    '<img class="result-thumb" src="' + preview.src + '" alt="">' +
                    '<div>' +
                        '<p class="result-overall-label">総合評価</p>' +
                        '<p class="result-overall-status status-' + oc + '">' + a.overall.status + '</p>' +
                        '<p class="result-overall-desc">' + a.overall.description + '</p>' +
                    '</div>' +
                '</div>' +

                '<div class="result-items">' +
                    '<div class="result-item border-' + cc + '">' +
                        '<p class="result-item-label">毛並みの状態</p>' +
                        '<div class="result-item-row">' +
                            '<div class="result-dot dot-' + cc + '"></div>' +
                            '<p class="result-item-text">' + a.coat.status + ' — ' + a.coat.description + '</p>' +
                        '</div>' +
                    '</div>' +
                    '<div class="result-item border-' + bc + '">' +
                        '<p class="result-item-label">体型・体格</p>' +
                        '<div class="result-item-row">' +
                            '<div class="result-dot dot-' + bc + '"></div>' +
                            '<p class="result-item-text">' + a.body.status + ' — ' + a.body.description + '</p>' +
                        '</div>' +
                    '</div>' +
                    '<div class="result-advice">' +
                        '<p class="result-advice-label">アドバイス</p>' +
                        '<p class="result-advice-text">' + a.recommendations + '</p>' +
                    '</div>' +
                '</div>' +

                '<div class="result-buttons">' +
                    '<button class="btn-ghost" onclick="clearAll()">クリア</button>' +
                    '<button class="btn-primary" onclick="clearAll()">もう一度スキャン</button>' +
                '</div>';

            results.style.display = 'block';
            previewSection.style.display = 'none';
        }

        function clearAll() {
            results.style.display = 'none';
            previewSection.style.display = 'none';
            uploadArea.style.display = '';
            preview.src = '';
            selectedFile = null;
            fileInput.value = '';
            hideError();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function showError(msg) { errorMsg.textContent = msg; errorMsg.style.display = 'block'; }
        function hideError() { errorMsg.style.display = 'none'; }
    </script>
</body>
</html>
